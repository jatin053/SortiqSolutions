<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="videoPlaceholderTitle videoPlaceholderDesc">
  <title id="videoPlaceholderTitle">Video placeholder</title>
  <desc id="videoPlaceholderDesc">A fallback preview image for videos without a custom thumbnail.</desc>
  <defs>
    <linearGradient id="videoPlaceholderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="55%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#videoPlaceholderGradient)" rx="24" />
  <circle cx="320" cy="180" r="52" fill="#ffffff" fill-opacity="0.16" />
  <circle cx="320" cy="180" r="44" fill="#ef4444" />
  <polygon points="308,154 308,206 350,180" fill="#ffffff" />
  <text x="320" y="285" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">
    Video Preview
  </text>
</svg>
